<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarfea Global Operations Matrix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- V11 Frameworks -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    
    <!-- Base styles -->
    <link rel="stylesheet" href="./style_enterprise.css?v=2.3">
    <!-- Prestige Design System v11 -->
    <link rel="stylesheet" href="./style_enterprise_v11.css?v=2.3">
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="v11-loader-spin"></div>
            <!-- Branding Removed -->
        </div>
    </div>

    <div id="app">
        <aside class="sidebar">
            <div class="sidebar-header">
                <!-- Sadece Arama Çubuğu -->
                <div class="search-section" style="padding: 0; background: transparent; border: none; margin-bottom: 0;">
                    <div class="search-bar" style="margin-bottom: 0;">
                        <i class="fas fa-search"></i>
                        <input type="text" id="masterSearch" placeholder="İl, İlçe veya Öğe Ara...">
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="sidebar-content" id="sidebarContent"></div>
            
            <div class="system-status">
                <span class="pulse-dot"></span>
                <span>Sistem Senkronize Ediliyor...</span>
            </div>
        </aside>

        <!-- Sidebar Genişletici (Resize Handle) -->
        <div class="desktop-resizer" id="desktopResizer"></div>

        <main class="map-frame">
            <div id="map"></div>
            <div class="map-controls-top">
                <button class="fast-add-btn" onclick="startFastAddProcess()">
                    <i class="fas fa-camera"></i>
                    <span>Hızlı Ekle</span>
                </button>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="./app_enterprise.js?v=2.3"></script>
</body>
</html>
